name: Check SPT Updates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checker
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check.js

      - name: Read result
        id: result
        run: |
          echo "changed=$(jq -r .changed result.json)" >> "$GITHUB_OUTPUT"
          echo "mods_checked=$(jq -r .modsChecked result.json)" >> "$GITHUB_OUTPUT"

      - name: Create issue
        if: steps.result.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(jq '.changes | length' result.json)
          BODY=$(jq -r '.changes[] | "• \(.)"' result.json)
          gh issue create \
            --title "$COUNT update(s) available" \
            --body "Updates detected across ${{ steps.result.outputs.mods_checked }} tracked mods:

          $BODY" \
            --label "automated"

      - name: Persist state
        run: |
          git add state.json
          git diff --cached --quiet && echo "State unchanged" || (
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update stored versions"
            git push
          )

      - name: Log status
        run: |
          if [ "${{ steps.result.outputs.changed }}" == "true" ]; then
            echo "Updates detected — issue created"
          else
            echo "No updates — everything is current"
          fi
